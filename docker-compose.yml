version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: jewelry_postgres
    environment:
      POSTGRES_DB: jewelry_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 2685
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: jewelry_redis
    ports:
      - "6379:6379"

  app:
    build: .
    container_name: jewelry_app
    depends_on:
      - postgres
      - redis
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/jewelry_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: 2685
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
    volumes:
      - ./logs:/app/logs

volumes:
  postgres_data:
